name: release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # npm OIDC trusted publishing requires npm CLI 11.5+; Node 20 ships ~10.x.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          # No NPM_TOKEN: trusted publishing uses the OIDC token from id-token: write.
          # When npm CLI 11.5+ detects the GitHub Actions OIDC env and a trusted
          # publisher is configured on the package, it mints a short-lived token.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
