name: release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Authenticate git with the RENOVATE PAT (not the default GITHUB_TOKEN)
          # so the "Version Packages" branch PUSH the changesets action makes is
          # attributed to the PAT user. A GITHUB_TOKEN push is recursion-guarded
          # (no push event fires) and makes the PR's pull_request runs trigger as
          # github-actions[bot] → gated in "action_required". With the PAT, the
          # push fires ci.yml (see its push trigger on this branch) and the check
          # goes green without an admin approving each release cycle. Publishing
          # still uses npm OIDC (id-token: write), independent of this token.
          token: ${{ secrets.RENOVATE_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # npm OIDC trusted publishing requires npm CLI 11.5+; Node 22 ships ~10.x.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          # No NPM_TOKEN: trusted publishing uses the OIDC token from id-token: write.
          # When npm CLI 11.5+ detects the GitHub Actions OIDC env and a trusted
          # publisher is configured on the package, it mints a short-lived token.
          #
          # Use the org RENOVATE PAT (not the built-in GITHUB_TOKEN) so the
          # "Version Packages" PR this action opens actually TRIGGERS ci.yml.
          # GitHub does not start workflow runs for events made with the built-in
          # GITHUB_TOKEN (recursion guard), which left every release PR's required
          # `build` check stuck in "action_required" and unmergeable without an
          # admin override. RENOVATE_TOKEN already has contents + pull-requests
          # write (it opens the fleet's Renovate PRs). Publishing still uses npm
          # OIDC (id-token: write) — this token only authors the version PR.
          GITHUB_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
