name: fleet-security

# Nightly fleet-wide security audit against each active site, writing the vuln counts + a freshness
# timestamp back to its Airtable row so the "Security Updates" checklist box can auto-tick.
# Repo-backed sites use GitHub Dependabot alerts (prod+dev); sites with no repo / no token fall back
# to `pnpm/npm audit`. UNLIKE fleet-lighthouse this stays checkout-FUL — the `pnpm audit` fallback
# reads each repo's committed lockfile, so every site is cloned (no install needed). Kept a SEPARATE
# job from fleet-lighthouse precisely so the lighthouse/domain/browser sweep stays checkout-free.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC — before the 08:00 lighthouse sweep + 09:23 drafts
  workflow_dispatch: {} # manual run from the Actions tab

concurrency:
  group: fleet-security
  cancel-in-progress: false

permissions:
  contents: read
  issues: write # open/close the nightly-failure tracking issue (parity with fleet-lighthouse)

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Fleet security audit + Airtable write-back
        # Repo-backed sites are audited from GitHub Dependabot alerts (ground truth: prod+dev,
        # GitHub Advisory DB) via the REST API. Sites with no repo (or when the alerts API is
        # unreachable/forbidden) fall back to `pnpm audit` against the committed lockfile — which is
        # why every fleet repo is still cloned (unauthenticated https — the fleet is public; a
        # private repo would fail its clone and be skipped+warned by prepareFleetSites, never fatal,
        # box stays manual). A failed/skipped audit writes NO counts + NO timestamp, so it can never
        # tick the box.
        timeout-minutes: 30
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          # Reads Dependabot alerts. The org RENOVATE PAT is reused as GITHUB_TOKEN (same as
          # release.yml); it needs the "Dependabot alerts: read" permission on the fleet repos.
          # WITHOUT that permission the alerts endpoint 403s and each repo-backed site GRACEFULLY
          # falls back to `pnpm audit` (prior behavior) — a missing permission degrades, never breaks.
          GITHUB_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          set -o pipefail
          # A site reporting vulns exits non-zero by design; key the gate on the machine-readable
          # FLEET_WRITE_SUMMARY line, not the exit code (same pattern as fleet-lighthouse).
          node dist/cli/bin.js audit \
            --fleet airtable \
            --only security \
            --write-airtable \
            --concurrency 1 \
            --workdir /tmp/fleet-security | tee /tmp/audit.out || true

          # `|| true`: under Actions' default `set -e`, a no-match grep in a command
          # substitution would abort the step before the explicit diagnostic below runs.
          summary=$(grep -oE "FLEET_WRITE_SUMMARY wrote=[0-9]+ failed=[0-9]+ total=[0-9]+" /tmp/audit.out | tail -n1 || true)
          if [ -z "$summary" ]; then
            echo "::error::fleet security printed no write summary — the run crashed before write-back (check Airtable creds / clone)."
            exit 1
          fi
          wrote=$(echo "$summary" | grep -oE "wrote=[0-9]+" | cut -d= -f2)
          failed=$(echo "$summary" | grep -oE "failed=[0-9]+" | cut -d= -f2)
          total=$(echo "$summary" | grep -oE "total=[0-9]+" | cut -d= -f2)
          echo "fleet write-back: wrote=$wrote failed=$failed total=$total"

          # Surface every partial miss as a visible annotation, even one within
          # tolerance — a tolerated single-site flake is then never invisible.
          if [ "$failed" -gt 0 ]; then
            notwritten=$(grep -oE "[0-9]+ site\(s\) not written:.*" /tmp/audit.out | tail -n1 || true)
            echo "::warning::fleet security: $failed/$total site(s) not written — $notwritten"
          fi

          # A site that couldn't even be prepared (bad/scheme-less URL + no repo, or a
          # private repo whose clone fails) is dropped rather than crashing the run
          # (resilient fleet prep). Raise it so the misconfigured Airtable row gets fixed.
          skipped=$(grep -oE "⚠ [0-9]+ site\(s\) skipped \(could not prepare\):.*" /tmp/audit.out | tail -n1 || true)
          if [ -n "$skipped" ]; then
            echo "::warning::fleet security: $skipped"
          fi

          # Total write-back failure: nothing landed at all (creds/API/inventory). This
          # is the silent-green hazard — every site's "Security Updates" box would stay
          # unticked while the job reported success.
          if [ "$wrote" -eq 0 ]; then
            echo "::error::fleet security wrote 0 of $total site(s) — total write-back failure (check Airtable creds / API)."
            exit 1
          fi

          # Mass flake: more than 25% of attempted sites failed to write. A single
          # known-flaky site stays green-with-warning; a real outage reds.
          if [ $((failed * 4)) -gt "$total" ]; then
            echo "::error::fleet security: $failed/$total site(s) failed to write (>25%) — investigate (not a single-site flake)."
            exit 1
          fi

      # Best-effort follow-up: kick Renovate for each active, repo-backed site just
      # flagged with critical/high vulns. Renovate's OSV vulnerability alerts bypass
      # the weekly schedule, so the remediation PR opens now (then auto-merges per
      # the shared preset). Runs only when the sweep above succeeded (default step
      # semantics) — though counts for any site the sweep failed/skipped to write are
      # last-known, not fresh; a stale-high false dispatch is a harmless Renovate
      # no-op, and a repo with an already-open Renovate PR is skipped. NEVER fails the
      # security job — a missing token clean-skips, and a per-repo failure (no
      # renovate.yml / token lacks actions:write) is a warning, not a red.
      - name: Trigger Renovate for sites with actionable vulnerabilities
        timeout-minutes: 10
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          node dist/cli/bin.js renovate-dispatch --fleet | tee /tmp/dispatch.out || true
          summary=$(grep -oE "RENOVATE_DISPATCH_SUMMARY dispatched=[0-9]+ skipped=[0-9]+ failed=[0-9]+" /tmp/dispatch.out | tail -n1 || true)
          echo "renovate-dispatch: ${summary:-<no summary — see output above>}"
          failed=$(echo "$summary" | grep -oE "failed=[0-9]+" | cut -d= -f2 || true)
          if [ -n "$failed" ] && [ "$failed" -gt 0 ]; then
            echo "::warning::renovate-dispatch: $failed repo(s) failed to dispatch (check RENOVATE_TOKEN actions:write scope / renovate.yml present)."
          fi

      # A red nightly is otherwise only GitHub's best-effort email to the last pusher.
      # File/reopen a single deduped tracking issue so a failure is durably visible, and
      # auto-close it once the run goes green again. continue-on-error so the alert
      # machinery can NEVER turn a run's status red. A DISTINCT title from
      # fleet-lighthouse's ("Nightly fleet audit failing") so the two workflows never
      # comment on or close each other's issue.
      - name: Open/update the nightly-failure tracking issue
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Nightly fleet security audit failing"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(printf 'The nightly **fleet-security** run failed.\n\nRun: %s\n\n_Auto-filed; auto-closes on the next green run._' "$run_url")
          existing=$(gh issue list --state open --json number,title \
            --jq "map(select(.title==\"$title\")) | .[0].number // empty" || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body" && echo "commented on existing #$existing"
          else
            gh issue create --title "$title" --body "$body"
          fi

      - name: Close the nightly-failure issue on recovery
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Nightly fleet security audit failing"
          for n in $(gh issue list --state open --json number,title \
            --jq "map(select(.title==\"$title\")) | .[].number" || true); do
            gh issue close "$n" --comment "Recovered — the nightly fleet-security run is green again." && echo "closed #$n"
          done
