name: ci

on:
  push:
    # `changeset-release/main` is the Changesets "Version Packages" bot branch.
    # Its PR opens via RENOVATE_TOKEN (see release.yml) so a pull_request event
    # DOES fire — but GitHub gates pull_request runs from that automation behind
    # manual approval, leaving every release PR's required `build` check stuck in
    # "action_required" and unmergeable without an admin approving each re-push.
    # A push event is not subject to that approval gate and produces the same
    # `build` check on the same SHA, so listing the branch here lets the release
    # PR go green on its own.
    branches: [main, changeset-release/main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      # Coverage-gated test run (enforces the floor in vitest.config.ts). Plain
      # `pnpm test` stays fast for local TDD; CI runs the suite once, with coverage.
      - run: pnpm test:coverage
      - run: pnpm test:dist

      # Test-suite tripwire: fail if build+tests left the tree dirty. dist/,
      # coverage/, .vitest-cache/ are gitignored, so anything here is a real leak
      # — e.g. a test that writes into the repo instead of os.tmpdir(). NOTE this
      # does NOT exercise the fleet a11y orphan (.reddoor-a11y-spec-*): that class
      # only occurs in local `audit` runs against a real checkout, not in unit
      # tests here nor in fleet-lighthouse.yml (lighthouse-only, deployed URLs,
      # /tmp workdir). It's backstopped by the gitignore entry + try/finally in
      # src/audits/a11y.ts. (2026-06-10 autonomy hardening.)
      - name: Working tree clean after build + tests
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::build/tests left the working tree dirty:"
            git status --porcelain
            git diff
            exit 1
          fi
