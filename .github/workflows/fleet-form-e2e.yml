name: fleet-form-e2e

# Nightly fleet-wide contact-form end-to-end probe → the Report Health Gate's
# `Form E2E OK` signal. Checkout-free (like fleet-lighthouse): Playwright drives
# each site's DEPLOYED prod URL, fills the /contact form, submits it with the
# `testMode` marker, and writes Form E2E OK + Form E2E checked at back to the
# Airtable row. Central ingest's testMode short-circuit routes the submission
# away from every real sink (no inbox/DB/webhook, Turnstile bypassed).
#
# REDDOOR_FORM_E2E_LIVE=1 arms the live runner — this workflow is the intended
# armer. Per-site safety is the /health `forms.testMode` declaration preflight:
# a site that doesn't declare forwarding is skipped without launching a browser
# (verdict preserved, never a fake lead), so this run is safe against a fleet
# where the forwarding rollout is still in progress. Sites enroll by shipping
# the starter's contact `buildPayload` forwarding + the /health declaration in
# one deploy.
on:
  schedule:
    - cron: "15 10 * * *" # 10:15 UTC — clear of 06:00 security / 08:00 lighthouse / 10:00 smoke (separate runners; the offset just staggers Airtable writes)
  workflow_dispatch: {} # manual run from the Actions tab

# Never overlap a manual run with the scheduled one.
concurrency:
  group: fleet-form-e2e
  cancel-in-progress: false

permissions:
  contents: read
  issues: write # open/close the nightly-form-e2e-failure tracking issue

jobs:
  form-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # The audit lazy-imports @playwright/test from THIS repo's node_modules —
      # pre-provision the chromium binary + OS libraries or the launch fails on
      # a bare ubuntu runner.
      - run: pnpm exec playwright install --with-deps chromium

      - name: Fleet form-e2e + Airtable write-back
        # Checkout-free and preflight-gated: undeclared sites cost one /health
        # fetch each, declared sites one browser session — far lighter than
        # fleet-smoke. 30 min is generous headroom.
        timeout-minutes: 30
        env:
          REDDOOR_FORM_E2E_LIVE: "1"
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          set -o pipefail
          # A failing submission makes the CLI exit non-zero BY DESIGN; tolerate it
          # and key the gate on the machine-readable FLEET_WRITE_SUMMARY line,
          # exactly like fleet-smoke/fleet-lighthouse. A site that hasn't rolled
          # out testMode forwarding self-skips via the /health declaration
          # preflight (counts as written, not failed), so the gate stays green
          # during rollout.
          # --workdir is only the clone fallback for a row missing deployedUrl
          # (form-e2e is checkout-free when the URL is present, and such a site
          # self-skips anyway) — mirrors fleet-lighthouse.
          node dist/cli/bin.js audit \
            --fleet airtable \
            --only form-e2e \
            --write-airtable \
            --concurrency 1 \
            --workdir /tmp/fleet-form-e2e | tee /tmp/form-e2e.out || true

          # `|| true`: under Actions' default `set -e`, a no-match grep in a command
          # substitution would abort the step before the diagnostic below runs.
          summary=$(grep -oE "FLEET_WRITE_SUMMARY wrote=[0-9]+ failed=[0-9]+ total=[0-9]+" /tmp/form-e2e.out | tail -n1 || true)
          if [ -z "$summary" ]; then
            echo "::error::fleet form-e2e printed no write summary — the run crashed before write-back (check Airtable creds / API)."
            exit 1
          fi
          wrote=$(echo "$summary" | grep -oE "wrote=[0-9]+" | cut -d= -f2)
          failed=$(echo "$summary" | grep -oE "failed=[0-9]+" | cut -d= -f2)
          total=$(echo "$summary" | grep -oE "total=[0-9]+" | cut -d= -f2)
          echo "fleet form-e2e write-back: wrote=$wrote failed=$failed total=$total"

          # Surface every partial miss as a visible warning.
          if [ "$failed" != "0" ]; then
            notwritten=$(grep -oE "✗ [^:]+: .*" /tmp/form-e2e.out | tail -n5 || true)
            echo "::warning::fleet form-e2e: $failed/$total site(s) not written — $notwritten"
          fi

          # A site that couldn't be prepared (bad URL/repo) is dropped from the run
          # rather than crashing it; raise it so the misconfigured Airtable row is fixed.
          skipped=$(grep -oE "⚠ [0-9]+ site\(s\) skipped \(could not prepare\):.*" /tmp/form-e2e.out | tail -n1 || true)
          if [ -n "$skipped" ]; then
            echo "::warning::fleet form-e2e: $skipped"
          fi

          # Mass flake: more than 25% of attempted sites failed to write.
          if [ $((failed * 4)) -gt "$total" ]; then
            echo "::error::fleet form-e2e: $failed/$total site(s) failed to write (>25%) — investigate (not a single-site flake)."
            exit 1
          fi

      # A red nightly is otherwise only GitHub's best-effort email to the last pusher.
      # File/reopen a single deduped tracking issue so a failure is durably visible,
      # and auto-close it once the run goes green again. continue-on-error so the alert
      # machinery can NEVER turn a run's status red.
      - name: Open/update the nightly-form-e2e-failure tracking issue
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Nightly fleet form-e2e failing"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(printf 'The nightly **fleet-form-e2e** run failed.\n\nRun: %s\n\n_Auto-filed; auto-closes on the next green run._' "$run_url")
          existing=$(gh issue list --state open --json number,title \
            --jq "map(select(.title==\"$title\")) | .[0].number // empty" || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body" && echo "commented on existing #$existing"
          else
            gh issue create --title "$title" --body "$body"
          fi

      - name: Close the nightly-form-e2e-failure issue on recovery
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Nightly fleet form-e2e failing"
          for n in $(gh issue list --state open --json number,title \
            --jq "map(select(.title==\"$title\")) | .[].number" || true); do
            gh issue close "$n" --comment "Recovered — the nightly fleet-form-e2e run is green again." && echo "closed #$n"
          done
