name: fleet-lighthouse

# Nightly fleet-wide Lighthouse against each active site's DEPLOYED URL (no
# checkout), writing the real-site scores back to its Airtable row. This repo is
# the central scheduler (it's active, so GitHub's 60-day cron-disable never
# triggers ‚Äî unlike a per-site cron). Sequential (--concurrency 1): ~10 sites √ó
# Lighthouse on a 2-core runner saturates if run in parallel.
on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC (~midnight PT), nightly
  workflow_dispatch: {} # manual run from the Actions tab

# Never overlap a manual run with the scheduled one.
concurrency:
  group: fleet-lighthouse
  cancel-in-progress: false

permissions:
  contents: read
  issues: write # open/close the nightly-failure tracking issue (M5 alerting)

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.1

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Fleet Lighthouse audit + Airtable write-back
        # Backstop a wedged run (e.g. a hung Lighthouse/Chrome) so it can't pin
        # the runner and ‚Äî via concurrency.cancel-in-progress=false ‚Äî block the
        # next night too. ~10 sequential sites finish well inside this.
        timeout-minutes: 30
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: |
          set -o pipefail
          # Every deployed site reports `fail` (real-site scores trip the
          # assertion gates), so the CLI exits non-zero BY DESIGN ‚Äî that is not a
          # job failure. We tolerate the exit code and instead key the gate on the
          # machine-readable `FLEET_WRITE_SUMMARY wrote=N failed=M total=T` line
          # (see formatFleetWriteSummary). This replaces the old "wrote ‚â• 1"
          # heuristic, which went green even when 9 of 10 sites flaked.
          node dist/cli/bin.js audit \
            --fleet airtable \
            --only lighthouse \
            --write-airtable \
            --concurrency 1 \
            --workdir /tmp/fleet-audit | tee /tmp/audit.out || true

          # `|| true`: under Actions' default `set -e`, a no-match grep in a
          # command substitution would abort the step before the explicit
          # diagnostic below ever runs. Guard it so we control the failure.
          summary=$(grep -oE "FLEET_WRITE_SUMMARY wrote=[0-9]+ failed=[0-9]+ total=[0-9]+" /tmp/audit.out | tail -n1 || true)
          if [ -z "$summary" ]; then
            echo "::error::fleet Lighthouse printed no write summary ‚Äî the run crashed before write-back (check Airtable creds / API)."
            exit 1
          fi
          wrote=$(echo "$summary" | grep -oE "wrote=[0-9]+" | cut -d= -f2)
          failed=$(echo "$summary" | grep -oE "failed=[0-9]+" | cut -d= -f2)
          total=$(echo "$summary" | grep -oE "total=[0-9]+" | cut -d= -f2)
          echo "fleet write-back: wrote=$wrote failed=$failed total=$total"

          # Surface every partial miss as a visible annotation, even one within
          # tolerance ‚Äî a tolerated flake (e.g. erp) is then never invisible.
          if [ "$failed" -gt 0 ]; then
            notwritten=$(grep -oE "[0-9]+ site\(s\) not written:.*" /tmp/audit.out | tail -n1 || true)
            echo "::warning::fleet Lighthouse: $failed/$total site(s) not written ‚Äî $notwritten"
          fi

          # Total write-back failure: nothing landed at all (creds/API/inventory).
          if [ "$wrote" -eq 0 ]; then
            echo "::error::fleet Lighthouse wrote 0 of $total site(s) ‚Äî total write-back failure (check Airtable creds / API)."
            exit 1
          fi

          # Mass flake: more than 25% of attempted sites failed to write. A single
          # known-flaky site stays green-with-warning; a real outage reds.
          if [ $((failed * 4)) -gt "$total" ]; then
            echo "::error::fleet Lighthouse: $failed/$total site(s) failed to write (>25%) ‚Äî investigate (not a single-site flake)."
            exit 1
          fi

      # M4 slice 2a: sweep three GitHub-sourced signals (Renovate-failing-CI count,
      # default-branch CI state, last-commit date) per repo-backed site into Airtable
      # so the cockpit reads them with zero request-path GitHub calls. `if: always()`
      # so a Lighthouse flake never skips the GitHub sweep.
      - name: Sweep GitHub signals to Airtable
        if: always()
        continue-on-error: true
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: node dist/cli/bin.js github-signals --fleet --write-airtable

      # M5 alerting (MEDIUM-I): a red nightly is otherwise only GitHub's best-effort
      # email to the last pusher. File/reopen a single deduped tracking issue so a
      # failure is durably visible, and auto-close it once the run goes green again.
      # continue-on-error so the alert machinery can NEVER turn a run's status red.
      - name: Open/update the nightly-failure tracking issue
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Identify the tracking issue by exact TITLE (not a label) so the only
          # permission needed is `issues: write` ‚Äî no `gh label create`, which can
          # require broader scope. Filter the listing locally for an exact match.
          title="Nightly fleet audit failing"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(printf 'The nightly **fleet-lighthouse** run failed.\n\nRun: %s\n\n_Auto-filed; auto-closes on the next green run._' "$run_url")
          existing=$(gh issue list --state open --json number,title \
            --jq "map(select(.title==\"$title\")) | .[0].number // empty" || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body" && echo "commented on existing #$existing"
          else
            gh issue create --title "$title" --body "$body"
          fi

      - name: Close the nightly-failure issue on recovery
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Nightly fleet audit failing"
          for n in $(gh issue list --state open --json number,title \
            --jq "map(select(.title==\"$title\")) | .[].number" || true); do
            gh issue close "$n" --comment "Recovered ‚Äî the nightly fleet-lighthouse run is green again." && echo "closed #$n"
          done
