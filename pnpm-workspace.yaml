# pnpm 11 reads settings from here (the package.json "pnpm" field is no longer read).
allowBuilds:
  # sharp runs a native build script — must be explicitly allowed in pnpm 11.
  sharp: true
  # esbuild and protobufjs also run build scripts (native bindings).
  esbuild: true
  protobufjs: true
minimumReleaseAge: 0

# Transitive-dependency security pins. pnpm 11 reads overrides HERE — neither the
# top-level package.json "overrides" (npm/yarn syntax) nor "pnpm.overrides" is read,
# so these previously-package.json pins were inert. Both CVEs are dev/CI-only (the
# audit CLI path via @lhci/cli), not the request surface, but the pin is cheap:
#   - tmp <0.2.6: path-traversal / symlink temp-write (GHSA-52f5-9888-hmc6 + 6r5x...)
#   - uuid <11.1.1: missing buffer-bounds check in v3/v5/v6
overrides:
  tmp@<0.2.6: ">=0.2.6"
  uuid@<11.1.1: ">=11.1.1"
  # Dev/CI-only transitive CVEs (vitest/tsup/build toolchain), pinned to the patched
  # versions. None are on the published package's runtime surface. Cleared 2026-06-25.
  #   - vite <8.0.16: server.fs.deny bypass + launch-editor NTLM (GHSA-fx2h-pf6j-xcff / -v6wh-96g9-6wx3);
  #     exact-pinned (not a range) because vite is peer-resolved (vitest/SvelteKit) and a range
  #     override was silently ignored — Renovate maintains the exact pin going forward.
  #   - esbuild <0.28.1: dev-server arbitrary file read on Windows (GHSA-g7r4-m6w7-qqqr)
  #   - cookie <0.7.0: out-of-bounds chars in name/path/domain (GHSA-pxg6-pf52-xh8x)
  #   - js-yaml 4.x <4.2.0: quadratic-complexity DoS in merge keys (GHSA-h67p-54hq-rp68);
  #     scoped to >=4.0.0 so the 3.x instance stays on its own 3.x backport line below.
  vite: "8.1.0"
  esbuild@<0.28.1: ">=0.28.1 <0.29"
  cookie@<0.7.0: ">=0.7.0 <1"
  js-yaml@>=4.0.0: ">=4.2.0 <5"
  # Dev/CI-only transitive CVEs, cleared 2026-07-14. All on the audit/build
  # toolchain (lighthouse/@lhci pulls ws@7 + js-yaml@3; libsql + puppeteer-core
  # pull ws@8), none on the published package's runtime surface:
  #   - ws <7.5.11 / 8.x <8.21.0: memory-exhaustion DoS from tiny fragments
  #     (GHSA ws advisory, patched per major line — pin each, capped to its major)
  #   - js-yaml 3.x <3.15.0: the merge-key DoS backport landed in 3.15.0
  #     (the 4.x line is pinned above)
  #   - protobufjs <=7.6.2: schema-derived names can shadow runtime-significant
  #     properties (GHSA-f38q-mgvj-vph7)
  ws@<7.5.11: ">=7.5.11 <8"
  ws@>=8.0.0 <8.21.0: ">=8.21.0 <9"
  js-yaml@<3.15.0: ">=3.15.0 <4"
  protobufjs@<7.6.3: ">=7.6.3 <8"

# Carried over from the old package.json "pnpm.auditConfig" (pnpm 11 reads it here now).
auditConfig:
  ignoreGhsas:
    - GHSA-pfq8-rq6v-vf5m
    # mjml mj-include directory traversal — only patched in 5.0.0-alpha (no 4.x
    # backport). Not reachable here: we compile only our own repo-committed
    # templates, never untrusted mjml input. Dependabot alert dismissed
    # tolerable_risk 2026-07-14; revisit when mjml 5 stabilizes.
    - GHSA-45h5-66jx-r2wf
