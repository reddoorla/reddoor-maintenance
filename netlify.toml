[build]
  command = "echo 'no build — functions only'"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# /s/:slug → site-dashboard function path is registered on the function
# itself via `export const config = { path: [...] }` in
# netlify/functions/site-dashboard.mts. A [[redirects]] rewrite with
# status=200 passes the ORIGINAL request URL to the function rather than
# the rewritten one, so query-string substitution (`slug=:slug`) never
# reached the handler — every request fell through to the health check.
#
# The same convention covers every routed endpoint — each declares its own
# `config.path` rather than a [[redirects]] rule here, so ctx.params is
# populated:
#   /api/reports/:id/approve      → approve-report.mts
#   /api/reports/:id/checklist    → report-checklist.mts
#   /api/submissions/:id/status   → submission-status.mts
